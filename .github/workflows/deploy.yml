name: Deploy site

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.dialine/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    env:
      DIALINE_BASE_PATH: ${{ vars.DIALINE_BASE_PATH }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Debug build environment
        env:
          VARS_DIALINE_BASE_PATH: ${{ vars.DIALINE_BASE_PATH }}
        run: |
          echo "DIALINE_BASE_PATH=${DIALINE_BASE_PATH:-<empty>}"
          echo "DIALINE_SITE_URL=${DIALINE_SITE_URL:-<empty>}"
          echo "vars.DIALINE_BASE_PATH=${VARS_DIALINE_BASE_PATH:-<empty>}"
          echo "GITHUB_REPOSITORY=${GITHUB_REPOSITORY:-<empty>}"
          echo "GITHUB_REF=${GITHUB_REF:-<empty>}"

      - name: Build
        run: pnpm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
